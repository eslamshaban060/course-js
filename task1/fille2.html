<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var intervalue;
      var sum = new Number(0);

      while (intervalue != 0) {
        intervalue = prompt("Enter New Number ya bash :");
        sum += +intervalue;
      }
      if (sum >= 100) {
        alert(sum);
      }
      intervalue = 0;
      alert(sum);
    </script>
  </body>
</html>
